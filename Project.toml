# set (DifferentialEquations, Observables, SparseArrays, ...).
# The core package MUST NOT depend on Makie or any UI/plotting package — that
# invariant is enforced structurally by keeping UI deps in ui/Project.toml.

[deps]

[compat]
julia = "1.10"

[extras]
